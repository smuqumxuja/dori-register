name: Update default form times

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-default-times.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch app script
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("static/app.js")
          text = path.read_text()

          local_datetime = '''function localDateTimeParts() {
            const now = new Date();
            const pad = (value) => String(value).padStart(2, "0");
            return {
              date: `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`,
              time: `${pad(now.getHours())}:${pad(now.getMinutes())}`,
            };
          }'''

          datetime_helpers = local_datetime + '''

          function setCurrentDateTime(dateInput, timeInput) {
            const current = localDateTimeParts();
            dateInput.value = current.date;
            timeInput.value = current.time;
          }

          function setMedicineCurrentDateTime() {
            setCurrentDateTime(
              medicineForm.elements.namedItem("received_date"),
              medicineForm.elements.namedItem("received_time"),
            );
          }

          function setUsageCurrentDateTime() {
            setCurrentDateTime(
              usageForm.elements.namedItem("entry_date"),
              usageForm.elements.namedItem("entry_time"),
            );
          }'''

          if "function setCurrentDateTime(" not in text:
            text = text.replace(local_datetime, datetime_helpers)

          replacements = [
            (
              '''  if (name === "medicine") {
            renderMedicines();
          }
          if (name === "usage") {
            renderMedicineChoices();
            updateUsageStockHint();
          }''',
              '''  if (name === "medicine") {
            if (!medicineForm.elements.namedItem("id").value) {
              setMedicineCurrentDateTime();
            }
            renderMedicines();
          }
          if (name === "usage") {
            setUsageCurrentDateTime();
            renderMedicineChoices();
            updateUsageStockHint();
          }''',
            ),
            (
              '''function resetMedicineForm() {
            medicineForm.reset();
            document.querySelector("#medicineId").value = "";
            const current = localDateTimeParts();
            document.querySelector("#medicineReceivedDate").value = current.date;
            document.querySelector("#medicineReceivedTime").value = current.time;
            if (!isSuperAdmin() && state.options.departments?.length === 1) {''',
              '''function resetMedicineForm() {
            medicineForm.reset();
            document.querySelector("#medicineId").value = "";
            setMedicineCurrentDateTime();
            if (!isSuperAdmin() && state.options.departments?.length === 1) {''',
            ),
            (
              '''function resetUsageForm() {
            usageForm.reset();
            const current = localDateTimeParts();
            document.querySelector("#usageDate").value = current.date;
            document.querySelector("#usageTime").value = current.time;
            usageForm.elements.namedItem("nurse_name").value = state.user?.full_name || "";''',
              '''function resetUsageForm() {
            usageForm.reset();
            setUsageCurrentDateTime();
            usageForm.elements.namedItem("nurse_name").value = state.user?.full_name || "";''',
            ),
          ]

          for old, new in replacements:
            if old in text:
              text = text.replace(old, new)

          path.write_text(text)
          Path(".github/workflows/update-default-times.yml").unlink(missing_ok=True)
          PY

      - name: Validate JavaScript
        run: node --check static/app.js

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Set form times to current time by default"
          git push
