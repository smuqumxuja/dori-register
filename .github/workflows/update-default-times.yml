name: Normalize view time refresh block

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-default-times.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize showView block
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("static/app.js")
          text = path.read_text()
          replacement = "\n".join([
              '  if (name === "medicine") {',
              '    if (!medicineForm.elements.namedItem("id").value) {',
              '      setMedicineCurrentDateTime();',
              '    }',
              '    renderMedicines();',
              '  }',
              '  if (name === "usage") {',
              '    setUsageCurrentDateTime();',
              '    renderMedicineChoices();',
              '    updateUsageStockHint();',
              '  }',
              '  if (name === "management") {',
          ])
          pattern = re.compile(
              r'  if \(name === "medicine"\) \{\n.*?  if \(name === "management"\) \{',
              re.S,
          )
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit("showView block not normalized")
          path.write_text(text)
          Path(".github/workflows/update-default-times.yml").unlink(missing_ok=True)
          PY

      - name: Validate JavaScript
        run: node --check static/app.js

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Normalize view time refresh block"
          git push
