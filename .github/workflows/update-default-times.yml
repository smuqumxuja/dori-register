name: Patch default form times on view open

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-default-times.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch showView defaults
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("static/app.js")
          text = path.read_text()
          original = text
          pattern = re.compile(
              r'  if \(name === "medicine"\) \{\n'
              r'    renderMedicines\(\);\n'
              r'  \}\n'
              r'  if \(name === "usage"\) \{\n'
              r'    renderMedicineChoices\(\);\n'
              r'    updateUsageStockHint\(\);\n'
              r'  \}'
          )
          replacement = '''  if (name === "medicine") {
            if (!medicineForm.elements.namedItem("id").value) {
              setMedicineCurrentDateTime();
            }
            renderMedicines();
          }
          if (name === "usage") {
            setUsageCurrentDateTime();
            renderMedicineChoices();
            updateUsageStockHint();
          }'''
          text, count = pattern.subn(replacement, text, count=1)
          if count == 0 and "setMedicineCurrentDateTime();\n    }\n    renderMedicines();" not in text:
            raise SystemExit("showView block not found")
          path.write_text(text)
          Path(".github/workflows/update-default-times.yml").unlink(missing_ok=True)
          PY

      - name: Validate JavaScript
        run: node --check static/app.js

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Refresh form times when opening views"
          git push
