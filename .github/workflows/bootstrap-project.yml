name: Bootstrap project files

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap-project.yml"
      - ".payload/project.tar.xz.b64"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unpack project archive
        run: |
          tr -d '\n\r\t ' < .payload/project.tar.xz.b64 | base64 -d > project-upload.tar.xz
          tar -xJf project-upload.tar.xz
          rm -f project-upload.tar.xz
          rm -rf .payload
          rm -f .github/workflows/bootstrap-project.yml

      - name: Commit extracted project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No project changes to commit"
            exit 0
          fi
          git commit -m "Refresh medication journal project"
          git push
